version: "3.8"

services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WS_HEARTBEAT_MS: "30000"
      MAX_PAYLOAD_BYTES: "1024"
      LOG_LEVEL: "info"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spatial_tracking
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
